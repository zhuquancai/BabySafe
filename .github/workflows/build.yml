name: 编译BabySafe

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: 下载源码
      uses: actions/checkout@v4

    - name: 安装MinGW
      run: |
        choco install mingw -y

    - name: 编译程序
      run: |
        g++ src/main.cpp src/adb.cpp src/action.cpp src/config.cpp -o BabySafe.exe -static

    - name: 创建发布目录
      run: |
        mkdir release
        copy BabySafe.exe release\
        copy config.ini release\

        if exist 级别 xcopy 级别 release\级别 /E /I
        if exist 来源 xcopy 来源 release\来源 /E /I

    - name: 创建压缩包
      uses: actions/upload-artifact@v4
      with:
        name: BabySafe完整版
        path: release
